<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Google icons recall -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!-- me-class-utility (utility personal classes css) -->
    <link rel="stylesheet" href="./style.css">

    <title>Book List</title>
</head>

<body>
    <!-- Image and text heading-->
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="#">
            <img src="./img/duck.png" width="60" height="60" class="d-inline-block align-top" alt="">
        </a>
        <div class="btn-group material-symbols-outlined">
            <button type="button" class="btn btn-secondary me-class-btn-secondary dropdown-toggle me-class-dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            </button>
            <div class="dropdown-menu dropdown-menu-right me-class-dropdown-menu">
              <button class="dropdown-item" type="button">Action</button>
              <button class="dropdown-item" type="button">Another action</button>
              <button class="dropdown-item" type="button">Something else here</button>
            </div>
          </div>
    </nav>
     <!-- Website starts-->
    <main>
        <!-- initial headline-->
        <div class="container">
            <div class="me-class-align">
                <h1>Catalogo libri</h1><button type="button" class="btn btn-primary">Aggiungi libro</button>
            </div>
        <!-- Table section-->
            <div class="row">
                <div class="col-8">
                    <table class="table me-class-table table-striped me-class-inline">
                        <thead>
                            <tr>
                                <th scope="col">Titolo</th>
                                <th scope="col">Data prestito</th>
                                <th scope="col">Stato</th>
                                <th scope="col">Azioni</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>I pilastri della terra</td>
                                <td>12.03.24</td>
                                <td>
                                    <span class="badge badge-pill badge-primary me-class-badge-primary-status-success me-class-badge-primary-headless ">Disponibile</span>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-outline-secondary me-class-btn-outline-secondary">
                                        <span class="material-symbols-outlined">
                                            edit
                                        </span>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary me-class-btn-outline-secondary">
                                        <span class="material-symbols-outlined">
                                            delete
                                        </span>
                                    </button>
                                </td>
                            </tr>
                            <tr>
                                <td>I pilastri della terra</td>
                                <td>12.03.24</td>
                                <td>
                                    <span class="badge badge-pill badge-primary me-class-badge-primary-status-borrowed me-class-badge-primary-headless ">In prestito</span>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-outline-secondary me-class-btn-outline-secondary">
                                        <span class="material-symbols-outlined">
                                            edit
                                        </span>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary me-class-btn-outline-secondary">
                                        <span class="material-symbols-outlined">
                                            delete
                                        </span>
                                    </button>
                                </td>
                            </tr>
                            <tr>
                                <td>I pilastri della terra</td>
                                <td>12.03.24</td>
                                <td>
                                    <span class="badge badge-pill badge-primary me-class-badge-primary-status-not-available me-class-badge-primary-headless ">Non disponibile</span>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-outline-secondary me-class-btn-outline-secondary">
                                        <span class="material-symbols-outlined">
                                            edit
                                        </span>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary me-class-btn-outline-secondary">
                                        <span class="material-symbols-outlined">
                                            delete
                                        </span>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="container">
                <div class="row">
                    <div class="col-4">
                        Ciao amici
                    </div>
                </div>
            </div>
    </main>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>

</html>
